# .github/workflows/update-macdb.yml
name: Update MAC DB CSV

on:
  schedule:
    - cron: '0 2 1 * *'  # 毎月1日 午前2時(UTC)
  workflow_dispatch:       # 手動実行可

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download IEEE CSV files
        run: |
          curl -O https://standards-oui.ieee.org/oui/oui.csv
          curl -O https://standards-oui.ieee.org/oui28/mam.csv
          curl -O https://standards-oui.ieee.org/oui36/oui36.csv
          curl -O https://standards-oui.ieee.org/cid/cid.csv
          curl -O https://standards-oui.ieee.org/iab/iab.csv
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.csv
          git diff --cached --quiet || git commit -m "Update IEEE CSV $(date '+%Y-%m-%d')"
          git push
